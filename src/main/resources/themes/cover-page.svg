<?xml version="1.0" encoding="UTF-8"?>
<svg width="2480" height="3508" viewBox="0 0 2480 3508" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Deep ink background -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0B1020"/>
      <stop offset="55%" stop-color="#111A33"/>
      <stop offset="100%" stop-color="#0A1228"/>
    </linearGradient>

    <!-- Accent spectrum: electric cyan -> azure -->
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00D1FF"/>
      <stop offset="100%" stop-color="#4F7CFF"/>
    </linearGradient>

    <!-- Soft glow for hero panel -->
    <radialGradient id="heroGlow" cx="50%" cy="40%" r="70%">
      <stop offset="0%" stop-color="#58A6FF" stop-opacity="0.20"/>
      <stop offset="100%" stop-color="#58A6FF" stop-opacity="0"/>
    </radialGradient>

    <!-- Subtle paper-noise -->
    <filter id="noise" x="-20%" y="-20%" width="140%" height="140%">
      <feTurbulence type="fractalNoise" baseFrequency="0.75" numOctaves="2" seed="9" result="noise"/>
      <feColorMatrix type="saturate" values="0"/>
      <feComponentTransfer>
        <feFuncA type="table" tableValues="0 0.04"/>
      </feComponentTransfer>
    </filter>

    <!-- Shadow for floating card -->
    <filter id="cardShadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="30" stdDeviation="28" flood-color="#020611" flood-opacity="0.55"/>
    </filter>
  </defs>

  <!-- Base -->
  <rect width="2480" height="3508" fill="url(#bg)"/>

  <!-- Noise texture -->
  <rect width="2480" height="3508" filter="url(#noise)" opacity="0.5"/>

  <!-- Structural grid lines -->
  <g opacity="0.13" stroke="#8AA4FF" stroke-width="2">
    <line x1="180" y1="0" x2="180" y2="3508"/>
    <line x1="2300" y1="0" x2="2300" y2="3508"/>
    <line x1="0" y1="300" x2="2480" y2="300"/>
    <line x1="0" y1="3208" x2="2480" y2="3208"/>
  </g>

  <!-- Bold asymmetric blocks -->
  <rect x="0" y="0" width="2480" height="26" fill="url(#accent)"/>
  <rect x="0" y="3482" width="2480" height="26" fill="url(#accent)"/>

  <rect x="180" y="420" width="2120" height="6" fill="#1F2B4D" opacity="0.95"/>
  <rect x="180" y="3082" width="2120" height="6" fill="#1F2B4D" opacity="0.95"/>

  <!-- Hero focal zone -->
  <g transform="translate(1240, 1600)">
    <circle cx="0" cy="0" r="640" fill="url(#heroGlow)"/>

    <!-- Floating frame -->
    <rect x="-440" y="-440" width="880" height="880" rx="36"
          fill="#0E1730" fill-opacity="0.88"
          stroke="#5B7FFF" stroke-opacity="0.45" stroke-width="3"
          filter="url(#cardShadow)"/>

    <!-- Inner ring -->
    <circle cx="0" cy="0" r="310" fill="none" stroke="#00D1FF" stroke-opacity="0.35" stroke-width="3"/>
    <circle cx="0" cy="0" r="350" fill="none" stroke="#A9BCFF" stroke-opacity="0.18" stroke-width="2"/>

    <!-- Brand mark -->
    <rect x="-170" y="-170" width="340" height="340" rx="24" fill="#F7FAFF" fill-opacity="0.97"/>
    <image href="docops.svg" x="-150" y="-150" width="300" height="300" preserveAspectRatio="xMidYMid meet"/>
  </g>

  <!-- Corner marks -->
  <g stroke="url(#accent)" stroke-width="6" opacity="0.8" fill="none">
    <path d="M120 120 H290 M120 120 V290"/>
    <path d="M2360 120 H2190 M2360 120 V290"/>
    <path d="M120 3388 H290 M120 3388 V3218"/>
    <path d="M2360 3388 H2190 M2360 3388 V3218"/>
  </g>

  <!-- Thin data ticks -->
  <g stroke="#90A7FF" stroke-width="2" opacity="0.35">
    <line x1="180" y1="880" x2="280" y2="880"/>
    <line x1="180" y1="940" x2="340" y2="940"/>
    <line x1="2200" y1="2480" x2="2300" y2="2480"/>
    <line x1="2140" y1="2540" x2="2300" y2="2540"/>
  </g>
</svg>